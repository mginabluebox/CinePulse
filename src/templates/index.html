<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePulse — Recommend</title>
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"></noscript>
</head>
<body class="cp-body">

<header class="cp-header">
  <div class="cp-header-inner">
    <a href="/" class="cp-logo">CinePulse</a>
    <nav class="cp-header-nav">
      <a href="/#calendarView" class="cp-nav-link">Calendar</a>
      <a href="/app" class="cp-nav-link active">Recommend</a>
    </nav>
  </div>
</header>

<main class="cp-main">
  <div class="cp-app-section">

    <div class="cp-form-block">
      <form id="movieRecommendForm">
        <label for="moviePreference" class="cp-section-title">What do you feel like watching?</label>
        <p class="cp-form-subcopy">We'll recommend 5 films from this week's showtimes.</p>
        <div class="cp-search-row">
          <input id="moviePreference" class="cp-input" placeholder="e.g. something uplifting, a mind-bender, romantic comedy">
          <div class="cp-search-actions">
            <button id="submitMovieRecommend" type="submit" class="cp-btn cp-btn-primary cp-btn-icon"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/><path d="M5 3v4"/><path d="M3 5h4"/><path d="M19 17v4"/><path d="M17 19h4"/></svg> Recommend</button>
            <button id="clearMovieRecommend" type="button" class="cp-btn cp-btn-secondary">Clear</button>
          </div>
        </div>
        <div id="movieRecommendError" class="cp-form-error d-none"></div>
      </form>
    </div>

    <div id="movieRecommendResultWrapper" class="d-none">
      <div id="movieTopHeaderWrapper">
        <h2 class="cp-section-title" id="movieTopHeader">Top matches</h2>
      </div>
      <p class="cp-swipe-hint" id="movieSwipeHint">&larr; pass &nbsp;&middot;&nbsp; like &rarr;</p>
      <div id="movieCards" class="card-deck-wrapper">
        <div id="noMovieRecs" class="cp-empty-state">No recommendations yet — submit the form above.</div>
      </div>
      <div id="movieSwipeSummary" class="mt-3 d-none"></div>
    </div>

  </div>
</main>

<footer class="cp-footer">
  <div class="cp-footer-inner">
    Showtimes sourced from Metrograph, Film Forum &amp; IFC Center
  </div>
</footer>

<script src="/static/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
